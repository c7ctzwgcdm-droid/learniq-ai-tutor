name: LearnIQ — Full Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6am UTC (health check)

env:
  NODE_VERSION: '18'

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Install & cache dependencies
  # ─────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/package-lock.json') }}

  # ─────────────────────────────────────────
  # JOB 2 — Lint & static analysis
  # ─────────────────────────────────────────
  lint:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/package-lock.json') }}

      - name: Lint code
        run: npm run lint
        working-directory: src

  # ─────────────────────────────────────────
  # JOB 3 — Backend API tests (Jest + Supertest)
  # ─────────────────────────────────────────
  api-tests:
    name: Backend API tests
    runs-on: ubuntu-latest
    needs: install

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: learniq
          POSTGRES_PASSWORD: learniq_test
          POSTGRES_DB: learniq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://learniq:learniq_test@localhost:5432/learniq_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      CLIENT_URL: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/package-lock.json') }}

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: src

      - name: Run API tests
        run: npm run test:api -- --coverage
        working-directory: src

      - name: Run freemium gate tests
        run: npm run test:freemium
        working-directory: src

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/coverage/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 4 — E2E browser tests (Playwright)
  # ─────────────────────────────────────────
  e2e-tests:
    name: E2E browser tests
    runs-on: ubuntu-latest
    needs: api-tests

    env:
      BASE_URL: ${{ secrets.DEPLOYED_SERVER_URL }}
      FRONTEND_URL: ${{ secrets.DEPLOYED_FRONTEND_URL }}
      TEST_EMAIL: learniq_ci_${{ github.run_id }}@mailinator.com
      TEST_PASSWORD: CiTestPass123!

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: src

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: src

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/playwright-report/
          retention-days: 7

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: src/test-results/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 5 — Security checks
  # ─────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: src/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/package-lock.json') }}

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: src
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ─────────────────────────────────────────
  # JOB 6 — Notify on failure (fixed)
  # Works for both direct pushes and PRs
  # ─────────────────────────────────────────
  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [lint, api-tests, e2e-tests, security]
    if: failure()
    steps:
      - name: Print failure summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TEST SUITE FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Branch:       ${{ github.ref_name }}"
          echo "  Commit:       ${{ github.sha }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Run URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Create GitHub Actions summary
        run: |
          echo "## ❌ Test Suite Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run logs | [View here](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Check the logs link above to see which job failed and why." >> $GITHUB_STEP_SUMMARY
            })
